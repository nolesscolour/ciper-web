<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cipher — Encrypted Text</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:          #0e0d0c;
    --bg2:         #151412;
    --bg3:         #1c1a18;
    --border:      #2a2724;
    --border2:     #332f2b;
    --accent:      #e8834a;
    --accent-dim:  rgba(232,131,74,0.10);
    --accent-glow: rgba(232,131,74,0.18);
    --text:        #f0ece7;
    --text2:       #a09890;
    --text3:       #5c5550;
    --success:     #5dbd8a;
    --error:       #d95c5c;
    --font-ui:    'Inter', sans-serif;
    --font-mono:  'JetBrains Mono', monospace;
    --r:           6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }

  .app {
    max-width: 620px;
    margin: 0 auto;
    padding: 52px 24px 88px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 11px;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .brand-sub {
    font-size: 11.5px;
    color: var(--text3);
    font-weight: 400;
    margin-top: 1px;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(232,131,74,0.2);
    border-radius: 20px;
    padding: 4px 11px 4px 8px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  .badge-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 2.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; }
    50%      { opacity:0.35; }
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 3px;
    width: fit-content;
    margin-bottom: 28px;
  }

  .tab {
    padding: 7px 22px;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font-ui);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    transition: all 0.15s;
    letter-spacing: -0.1px;
  }

  .tab.active {
    background: var(--bg3);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .tab:hover:not(.active) { color: var(--text); }

  /* ── Label ── */
  .lbl {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 7px;
  }

  /* ── Textarea ── */
  .field {
    margin-bottom: 16px;
  }

  textarea, input[type=password], input[type=text] {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12.5px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    line-height: 1.65;
  }

  textarea {
    resize: vertical;
    min-height: 152px;
    display: block;
  }

  textarea::placeholder {
    color: var(--text3);
    font-family: var(--font-ui);
    font-size: 13px;
  }

  textarea:focus, input:focus {
    border-color: var(--border2);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  /* ── Pass row ── */
  .pass-wrap {
    position: relative;
  }

  .pass-wrap input {
    padding-right: 44px;
    letter-spacing: 0.5px;
  }

  .pass-wrap input::placeholder {
    font-family: var(--font-ui);
    font-size: 13px;
    letter-spacing: 0;
  }

  .eye {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 42px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: color 0.15s;
  }
  .eye:hover { color: var(--text2); }

  /* ── Strength ── */
  .strength {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 7px;
    margin-bottom: 18px;
  }

  .s-track { display:flex; gap:3px; flex:1; }

  .s-seg {
    height: 3px;
    flex: 1;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.25s;
  }

  .s-word {
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    min-width: 44px;
    text-align: right;
    transition: color 0.25s;
  }

  /* ── Button ── */
  .btn {
    width: 100%;
    padding: 12px;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.1px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--r);
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
  }

  .btn:hover {
    background: #f0915a;
    box-shadow: 0 4px 18px var(--accent-glow);
    transform: translateY(-1px);
  }

  .btn:active { transform: translateY(0); box-shadow: none; }

  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn.secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border2);
  }

  .btn.secondary:hover {
    background: var(--accent-dim);
    box-shadow: none;
  }

  /* ── Error ── */
  .err {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(217,92,92,0.07);
    border: 1px solid rgba(217,92,92,0.18);
    border-radius: var(--r);
    font-size: 12.5px;
    color: var(--error);
    font-family: var(--font-mono);
  }
  .err.on { display:block; }

  /* ── Output ── */
  .out-wrap {
    display: none;
    margin-top: 24px;
    animation: up 0.2s ease;
  }
  .out-wrap.on { display: block; }

  @keyframes up {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .out-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }

  .out-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .out-ttl {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .out-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--success);
  }

  .out-btns { display:flex; gap:6px; }

  .ghost {
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-ui);
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ghost:hover { background: rgba(255,255,255,0.04); color: var(--text); }

  .out-ta {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 14px;
    resize: none;
    min-height: 96px;
    outline: none;
    word-break: break-all;
    letter-spacing: 0.3px;
  }

  .out-ta.plain {
    color: var(--text);
    word-break: normal;
    font-size: 13px;
    letter-spacing: 0;
  }

  /* ── Divider ── */
  .hr { height:1px; background:var(--border); margin: 28px 0; }

  /* ── Footer ── */
  .footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .foot-note {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.7;
  }

  .foot-note strong { color: var(--text2); font-weight: 500; }

  .pills { display:flex; gap:5px; flex-wrap:wrap; }

  .pill {
    font-size: 10.5px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text3);
    letter-spacing: 0.2px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="wordmark">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 3L27 10V20L15 27L3 20V10L15 3Z" fill="#e8834a" fill-opacity="0.12" stroke="#e8834a" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M15 3V27" stroke="#e8834a" stroke-width="1.4" stroke-opacity="0.5"/>
        <path d="M3 10L15 17L27 10" stroke="#e8834a" stroke-width="1.4" stroke-opacity="0.5"/>
      </svg>
      <div>
        <div class="brand-name">Cipher</div>
        <div class="brand-sub">by Cursor</div>
      </div>
    </div>
    <div class="badge">
      <div class="badge-dot"></div>
      AES-256-GCM
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabE" onclick="setMode('encrypt')">Encrypt</button>
    <button class="tab" id="tabD" onclick="setMode('decrypt')">Decrypt</button>
  </div>

  <!-- Message field -->
  <div class="field">
    <div class="lbl" id="inLbl">Message</div>
    <textarea id="inTA" placeholder="Type or paste your message here…"></textarea>
  </div>

  <!-- Passphrase -->
  <div class="field">
    <div class="lbl">Passphrase</div>
    <div class="pass-wrap">
      <input type="password" id="passIn" placeholder="Enter a secret passphrase…" oninput="updateStr()"/>
      <button class="eye" onclick="toggleEye()" title="Toggle visibility">
        <span id="eyeIco">○</span>
      </button>
    </div>
    <div class="strength">
      <div class="s-track">
        <div class="s-seg" id="s1"></div>
        <div class="s-seg" id="s2"></div>
        <div class="s-seg" id="s3"></div>
        <div class="s-seg" id="s4"></div>
      </div>
      <span class="s-word" id="sWord"></span>
    </div>
  </div>

  <!-- CTA -->
  <button class="btn" id="mainBtn" onclick="run()">Encrypt message</button>

  <!-- Error -->
  <div class="err" id="errEl"></div>

  <!-- Output -->
  <div class="out-wrap" id="outWrap">
    <div class="out-box">
      <div class="out-head">
        <div class="out-ttl">
          <div class="out-dot"></div>
          <span id="outTtl">Encrypted output</span>
        </div>
        <div class="out-btns">
          <button class="ghost" onclick="doCopy()">Copy</button>
          <button class="ghost" id="useBtn" onclick="useAsInput()">Use as input →</button>
        </div>
      </div>
      <textarea class="out-ta" id="outTA" readonly rows="5"></textarea>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="foot-note">
      <strong>Zero data transmission.</strong><br/>
      Encryption runs entirely in your browser.<br/>
      Your message never leaves this page.
    </div>
    <div class="pills">
      <span class="pill">AES-256-GCM</span>
      <span class="pill">PBKDF2 · 250k</span>
      <span class="pill">SHA-256</span>
      <span class="pill">Client-only</span>
    </div>
  </div>

</div>
<script>
let mode = 'encrypt', eyeOpen = false;

function setMode(m) {
  mode = m;
  const e = m === 'encrypt';
  document.getElementById('tabE').classList.toggle('active', e);
  document.getElementById('tabD').classList.toggle('active', !e);
  document.getElementById('inLbl').textContent    = e ? 'Message' : 'Encrypted code';
  document.getElementById('inTA').placeholder     = e ? 'Type or paste your message here…' : 'Paste your encrypted code here…';
  document.getElementById('mainBtn').textContent  = e ? 'Encrypt message' : 'Decrypt message';
  document.getElementById('mainBtn').className    = e ? 'btn' : 'btn secondary';
  document.getElementById('outTtl').textContent   = e ? 'Encrypted output' : 'Decrypted message';
  document.getElementById('outTA').className      = e ? 'out-ta' : 'out-ta plain';
  document.getElementById('useBtn').style.display = e ? '' : 'none';
  document.getElementById('outWrap').classList.remove('on');
  document.getElementById('errEl').classList.remove('on');
}

function toggleEye() {
  eyeOpen = !eyeOpen;
  document.getElementById('passIn').type = eyeOpen ? 'text' : 'password';
  document.getElementById('eyeIco').textContent = eyeOpen ? '●' : '○';
}

function updateStr() {
  const v = document.getElementById('passIn').value;
  const segs = [1,2,3,4].map(i => document.getElementById('s'+i));
  const lbl = document.getElementById('sWord');
  let s = 0;
  if (v.length >= 8)  s++;
  if (v.length >= 14) s++;
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
  if (/[^a-zA-Z0-9]/.test(v)) s++;
  const clr  = ['#d95c5c','#e8834a','#d4b84a','#5dbd8a'];
  const word = ['Weak','Fair','Good','Strong'];
  segs.forEach((seg, i) => seg.style.background = i < s ? clr[Math.max(0,s-1)] : 'var(--border)');
  if (v.length) { lbl.textContent = word[Math.max(0,s-1)]; lbl.style.color = clr[Math.max(0,s-1)]; }
  else { lbl.textContent = ''; }
}

// ─── Crypto ────────────────────────────────────────────
async function deriveKey(pass, salt) {
  const mat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:250000, hash:'SHA-256' },
    mat, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

const b64enc = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const b64dec = s   => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function doEncrypt(txt, pass) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(pass, salt);
  const ct   = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, new TextEncoder().encode(txt));
  const out  = new Uint8Array(16 + 12 + ct.byteLength);
  out.set(salt,0); out.set(iv,16); out.set(new Uint8Array(ct),28);
  return b64enc(out.buffer);
}

async function doDecrypt(code, pass) {
  const buf  = b64dec(code);
  const key  = await deriveKey(pass, buf.slice(0,16));
  const pt   = await crypto.subtle.decrypt({ name:'AES-GCM', iv:buf.slice(16,28) }, key, buf.slice(28));
  return new TextDecoder().decode(pt);
}

// ─── Run ───────────────────────────────────────────────
async function run() {
  const input = document.getElementById('inTA').value.trim();
  const pass  = document.getElementById('passIn').value;
  const errEl = document.getElementById('errEl');
  const outWr = document.getElementById('outWrap');
  const outTA = document.getElementById('outTA');
  const btn   = document.getElementById('mainBtn');

  errEl.classList.remove('on');
  outWr.classList.remove('on');

  if (!input) { showErr('Please enter a message.'); return; }
  if (!pass)  { showErr('Please enter a passphrase.'); return; }
  if (pass.length < 4) { showErr('Passphrase must be at least 4 characters.'); return; }

  btn.disabled = true;
  btn.textContent = mode === 'encrypt' ? 'Encrypting…' : 'Decrypting…';

  try {
    const result = mode === 'encrypt' ? await doEncrypt(input, pass) : await doDecrypt(input, pass);
    outTA.value = result;
    outTA.className = mode === 'encrypt' ? 'out-ta' : 'out-ta plain';
    outWr.classList.add('on');
  } catch {
    showErr(mode === 'decrypt'
      ? 'Decryption failed — wrong passphrase or corrupted code.'
      : 'Encryption failed. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = mode === 'encrypt' ? 'Encrypt message' : 'Decrypt message';
  }
}

function showErr(msg) {
  const el = document.getElementById('errEl');
  el.textContent = msg;
  el.classList.add('on');
}

function doCopy() {
  navigator.clipboard.writeText(document.getElementById('outTA').value);
  const b = event.target;
  b.textContent = 'Copied!';
  setTimeout(() => b.textContent = 'Copy', 1600);
}

function useAsInput() {
  const val = document.getElementById('outTA').value;
  setMode('decrypt');
  document.getElementById('inTA').value = val;
}
</script>
</body>
</html>
